<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>清道夫 · AI简历助手</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --text: #e4e4e7;
      --muted: #71717a;
      --accent: #6366f1;
      --accent2: #8b5cf6;
    }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated background */
    .bg-grid {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image:
        linear-gradient(rgba(99,102,241,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridMove 20s linear infinite;
      pointer-events: none;
    }
    @keyframes gridMove {
      0% { transform: translate(0, 0); }
      100% { transform: translate(60px, 60px); }
    }

    .glow {
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      pointer-events: none;
    }
    .glow-1 { top: -200px; left: -200px; background: var(--accent); animation: float1 8s ease-in-out infinite; }
    .glow-2 { bottom: -200px; right: -200px; background: var(--accent2); animation: float2 10s ease-in-out infinite; }
    @keyframes float1 { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(50px, 30px); } }
    @keyframes float2 { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(-40px, -20px); } }

    /* Container */
    .container {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 100px 24px;
      text-align: center;
    }

    /* Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(99,102,241,0.1);
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 100px;
      font-size: 13px;
      color: var(--accent);
      margin-bottom: 32px;
      animation: fadeInUp 0.8s ease-out;
    }
    .badge-dot {
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* Title */
    .title {
      font-size: clamp(48px, 10vw, 72px);
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 24px;
      animation: fadeInUp 0.8s ease-out 0.1s both;
    }
    .title-gradient {
      background: linear-gradient(135deg, var(--accent), var(--accent2), #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      font-size: 18px;
      color: var(--muted);
      max-width: 500px;
      margin: 0 auto 48px;
      line-height: 1.7;
      animation: fadeInUp 0.8s ease-out 0.2s both;
    }

    /* Jobs pills */
    .jobs {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 48px;
      animation: fadeInUp 0.8s ease-out 0.3s both;
    }
    .job-pill {
      padding: 10px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      font-size: 13px;
      color: var(--text);
      transition: all 0.3s ease;
      cursor: default;
    }
    .job-pill:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(99,102,241,0.2);
    }
    .job-pill span { margin-right: 6px; }

    /* CTA Button */
    .cta {
      animation: fadeInUp 0.8s ease-out 0.4s both;
    }
    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
    }
    .cta-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(99,102,241,0.4);
    }
    .cta-btn svg { transition: transform 0.3s; }
    .cta-btn:hover svg { transform: translateX(4px); }

    /* Footer */
    .footer {
      margin-top: 80px;
      font-size: 13px;
      color: var(--muted);
      animation: fadeInUp 0.8s ease-out 0.5s both;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <div class="container">
    <div class="badge">
      <span class="badge-dot"></span>
      AI驱动的简历生成器
    </div>

    <h1 class="title">
      <span class="title-gradient">清道夫</span>
    </h1>

    <p class="subtitle">
      11个AI相关岗位的真实简历数据，填入信息即可生成专属简历。数据与视图分离，永远不会乱。
    </p>

    <div class="jobs">
      <div class="job-pill"><span>🤖</span>Agent开发工程师</div>
      <div class="job-pill"><span>🎯</span>AI产品经理</div>
      <div class="job-pill"><span>🧠</span>AI算法工程师</div>
      <div class="job-pill"><span>⚡</span>垂类落地工程师</div>
      <div class="job-pill"><span>🎨</span>前端工程师</div>
      <div class="job-pill"><span>⚙️</span>后端工程师</div>
      <div class="job-pill"><span>📊</span>AI运营</div>
      <div class="job-pill"><span>🏷️</span>数据标注员</div>
      <div class="job-pill"><span>🔒</span>AI安全专家</div>
      <div class="job-pill"><span>💼</span>售前顾问</div>
      <div class="job-pill"><span>📢</span>市场品牌</div>
    </div>

    <div class="cta">
      <a href="builder.html" class="cta-btn">
        开始创作
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </a>
    </div>

    <div class="footer">
      数据驱动 · 视图干净 · 永不过时
    </div>
  </div>
</body>
</html>
