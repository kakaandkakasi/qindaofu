<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>清道夫 · AI简历助手</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --text: #e4e4e7;
      --muted: #71717a;
      --accent: #6366f1;
      --accent2: #8b5cf6;
    }
    body { font-family: 'Space Grotesk', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    
    /* Header */
    .header { padding: 20px 40px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .logo { font-size: 20px; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .header-actions { display: flex; gap: 12px; }
    .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 500; transition: all 0.2s; }
    .btn-reset { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn-reset:hover { border-color: var(--accent); }
    .btn-export { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; }
    .btn-export:hover { opacity: 0.9; }

    /* Main layout */
    .main { display: flex; height: calc(100vh - 61px); }
    
    /* Sidebar */
    .sidebar { width: 320px; border-right: 1px solid var(--border); padding: 24px; overflow-y: auto; flex-shrink: 0; }
    .sidebar-title { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }
    .template-list { display: flex; flex-direction: column; gap: 8px; }
    .template-item { padding: 14px 16px; border-radius: 10px; background: var(--surface); border: 1px solid var(--border); cursor: pointer; transition: all 0.2s; text-align: left; font-family: inherit; color: var(--text); font-size: 14px; display: flex; align-items: center; gap: 10px; }
    .template-item:hover { border-color: var(--accent); transform: translateX(4px); }
    .template-item.active { border-color: var(--accent); background: rgba(99,102,241,0.1); }
    .template-icon { font-size: 18px; }

    /* Editor */
    .editor { flex: 1; padding: 32px; overflow-y: auto; }
    .form-section { margin-bottom: 28px; }
    .form-section-title { font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-size: 12px; color: var(--muted); font-weight: 500; }
    .form-input, .form-textarea { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; color: var(--text); font-family: inherit; font-size: 14px; transition: border-color 0.2s; width: 100%; }
    .form-input:focus, .form-textarea:focus { outline: none; border-color: var(--accent); }
    .form-textarea { resize: vertical; min-height: 100px; }
    .form-group.full .form-input,
    .form-group.full .form-textarea { width: 100%; }

    /* Preview */
    .preview { width: 420px; border-left: 1px solid var(--border"); padding: 24px; overflow-y: auto; flex-shrink: 0; background: var(--surface); }
    .preview-title { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }
    .resume-paper { background: white; border-radius: 12px; padding: 28px; color: #1a1a1a; font-size: 13px; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    .resume-name { font-size: 22px; font-weight: 700; color: #0a0a0f; margin-bottom: 6px; }
    .resume-target { font-size: 14px; color: var(--accent); font-weight: 600; margin-bottom: 12px; }
    .resume-meta { display: flex; gap: 16px; font-size: 12px; color: #71717a; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid #e4e4e7; }
    .resume-section { margin-bottom: 18px; }
    .resume-section-title { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .resume-text { font-size: 13px; color: #3a3a3a; line-height: 1.6; }
    .resume-skills { display: flex; flex-wrap: wrap; gap: 6px; }
    .skill-tag { background: #f0f0ff; color: var(--accent); padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 500; }
    .resume-item { margin-bottom: 10px; }
    .resume-item-desc { font-size: 12px; color: #3a3a3a; line-height: 1.5; }

    @media (max-width: 1200px) {
      .preview { display: none; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">清道夫 · AI简历助手</div>
    <div class="header-actions">
      <button class="btn btn-reset" onclick="resetForm()">重置</button>
      <button class="btn btn-export" onclick="exportResume()">导出</button>
    </div>
  </header>

  <main class="main">
    <aside class="sidebar">
      <div class="sidebar-title">选择岗位 🤖</div>
      <div class="template-list" id="templateList"></div>
    </aside>

    <section class="editor">
      <form id="editorForm">
        <div id="formContent"></div>
      </form>
    </section>

    <aside class="preview">
      <div class="preview-title">实时预览 📄</div>
      <div id="resumePaper" class="resume-paper"></div>
    </aside>
  </main>

  <script>
    // Job names
    const jobNames = {
      '01': 'Agent开发工程师', '02': 'AI产品经理', '03': 'AI算法工程师',
      '04': '垂类落地工程师', '05': '前端工程师', '06': '后端工程师',
      '07': 'AI运营', '08': '数据标注员', '09': 'AI安全专家',
      '10': '售前顾问', '11': '市场品牌'
    };

    // Icons
    const jobIcons = {
      '01': '🤖', '02': '🎯', '03': '🧠', '04': '⚡',
      '05': '🎨', '06': '⚙️', '07': '📊', '08': '🏷️',
      '09': '🔒', '10': '💼', '11': '📢'
    };

    let currentTemplate = '01';
    let presets = {};

    // Load presets.json
    async function loadPresets() {
      try {
        const res = await fetch('presets.json');
        presets = await res.json();
        renderTemplateList();
        loadTemplate('01');
      } catch (e) {
        console.error('Failed to load presets:', e);
        // Fallback: show error
        document.getElementById('templateList').innerHTML = '<p style="color:var(--muted);padding:20px;">数据加载失败</p>';
      }
    }

    // Render sidebar
    function renderTemplateList() {
      const list = document.getElementById('templateList');
      list.innerHTML = Object.entries(jobNames).map(([id, name]) => `
        <button class="template-item ${id === currentTemplate ? 'active' : ''}" onclick="loadTemplate('${id}')">
          <span class="template-icon">${jobIcons[id]}</span>
          <span>${name}</span>
        </button>
      `).join('');
    }

    // Load template
    function loadTemplate(id) {
      currentTemplate = id;
      renderTemplateList();
      renderForm();
      renderPreview();
      saveToStorage();
    }

    // Render form
    function renderForm() {
      const data = presets[currentTemplate] || {};
      document.getElementById('formContent').innerHTML = `
        <div class="form-section">
          <div class="form-section-title">基本信息</div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">姓名</label>
              <input type="text" id="name" class="form-input" value="${data.name || ''}" placeholder="输入姓名">
            </div>
            <div class="form-group">
              <label class="form-label">城市</label>
              <input type="text" id="city" class="form-input" value="${data.city || ''}" placeholder="城市">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">工作年限</label>
              <input type="text" id="experience" class="form-input" value="${data.experience || ''}" placeholder="X年">
            </div>
            <div class="form-group">
              <label class="form-label">期望薪资</label>
              <input type="text" id="salary" class="form-input" value="${data.salary || ''}" placeholder="XX-XXK">
            </div>
          </div>
        </div>
        <div class="form-section">
          <div class="form-section-title">简历内容</div>
          <div class="form-group full">
            <label class="form-label">个人简介</label>
            <textarea id="summary" class="form-textarea" placeholder="个人简介">${data.summary || ''}</textarea>
          </div>
          <div class="form-group full">
            <label class="form-label">核心技能（逗号分隔）</label>
            <input type="text" id="skills" class="form-input" value="${data.skills || ''}" placeholder="技能1, 技能2, ...">
          </div>
        </div>
        <div class="form-section">
          <div class="form-section-title">项目经历</div>
          <div class="form-group full">
            <label class="form-label">项目描述</label>
            <textarea id="project" class="form-textarea" placeholder="项目经历">${data.project || ''}</textarea>
          </div>
        </div>
        <div class="form-section">
          <div class="form-section-title">工作经历</div>
          <div class="form-group full">
            <label class="form-label">工作经历</label>
            <textarea id="work" class="form-textarea" placeholder="工作经历">${data.work || ''}</textarea>
          </div>
        </div>
      `;

      // Add auto-save listeners
      document.querySelectorAll('#editorForm input, #editorForm textarea').forEach(el => {
        el.addEventListener('input', () => {
          renderPreview();
          saveToStorage();
        });
      });
    }

    // Render preview
    function renderPreview() {
      const paper = document.getElementById('resumePaper');
      const name = getVal('name') || 'Your Name';
      const job = jobNames[currentTemplate] || '目标岗位';
      const city = getVal('city') || 'City';
      const exp = getVal('experience') || 'X年';
      const salary = getVal('salary') || 'XXK';
      const summary = getVal('summary') || '个人简介...';
      const skills = getVal('skills').split(',').map(s => s.trim()).filter(Boolean);
      const project = getVal('project') || '项目经历...';
      const work = getVal('work') || '';

      paper.innerHTML = `
        <div class="resume-name">${name}</div>
        <div class="resume-target">${job}</div>
        <div class="resume-meta">
          <span>📍 ${city}</span>
          <span>💼 ${exp}</span>
          <span>💰 ${salary}</span>
        </div>
        <div class="resume-section">
          <div class="resume-section-title">个人简介</div>
          <p class="resume-text">${summary}</p>
        </div>
        ${skills.length ? `
        <div class="resume-section">
          <div class="resume-section-title">核心技能</div>
          <div class="resume-skills">${skills.map(s => `<span class="skill-tag">${s}</span>`).join('')}</div>
        </div>` : ''}
        <div class="resume-section">
          <div class="resume-section-title">项目经历</div>
          <div class="resume-item">
            <div class="resume-item-desc">${project}</div>
          </div>
        </div>
        ${work ? `
        <div class="resume-section">
          <div class="resume-section-title">工作经历</div>
          <div class="resume-item">
            <div class="resume-item-desc">${work}</div>
          </div>
        </div>` : ''}
      `;
    }

    // Get value helper
    function getVal(id) {
      const el = document.getElementById(id);
      return el ? el.value : '';
    }

    // Save/Load from localStorage
    function saveToStorage() {
      const data = {};
      document.querySelectorAll('#editorForm input, #editorForm textarea').forEach(el => {
        if (el.id) data[el.id] = el.value;
      });
      localStorage.setItem('resume_' + currentTemplate, JSON.stringify(data));
    }

    function loadFromStorage() {
      try {
        const saved = JSON.parse(localStorage.getItem('resume_' + currentTemplate) || '{}');
        Object.keys(saved).forEach(id => {
          const el = document.getElementById(id);
          if (el) el.value = saved[id];
        });
      } catch (e) {}
    }

    function resetForm() {
      if (confirm('确定要重置吗？')) {
        localStorage.removeItem('resume_' + currentTemplate);
        loadTemplate(currentTemplate);
      }
    }

    function exportResume() {
      const name = getVal('name') || '未填写';
      const job = jobNames[currentTemplate] || '目标岗位';
      const city = getVal('city') || '未填写';
      const exp = getVal('experience') || '未填写';
      const salary = getVal('salary') || '未填写';
      const summary = getVal('summary') || '未填写';
      const skills = getVal('skills') || '未填写';
      const project = getVal('project') || '未填写';
      const work = getVal('work') || '';

      const md = `# ${name}\n**${job}** | 📍 ${city} | 💼 ${exp} | 💰 ${salary}\n\n---\n\n## 个人简介\n${summary}\n\n## 核心技能\n${skills}\n\n## 项目经历\n${project}\n${work ? '\n## 工作经历\n' + work : ''}`;

      const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = name + '_简历.md';
      a.click();
      URL.revokeObjectURL(url);
    }

    // Init
    loadPresets();
  </script>
</body>
</html>
