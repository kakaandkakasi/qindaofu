<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>清道夫 · AI简历助手</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #050505;
      --surface: #0a0a0a;
      --border: #1a1a1a;
      --text: #fff;
      --muted: #666;
      --accent: #3b82f6;
    }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    /* Top Bar */
    .topbar {
      height: 56px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: var(--surface);
      flex-shrink: 0;
    }
    
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    
    .topbar-logo {
      font-size: 14px;
      font-weight: 600;
    }
    
    .topbar-logo span {
      color: var(--muted);
      font-weight: 400;
    }
    
    .topbar-tabs {
      display: flex;
      gap: 4px;
      background: #0f0f0f;
      padding: 4px;
      border-radius: 8px;
    }
    
    .topbar-tab {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.15s;
    }
    
    .topbar-tab.active {
      background: #1a1a1a;
      color: var(--text);
    }
    
    .topbar-actions {
      display: flex;
      gap: 10px;
    }
    
    .btn {
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      font-family: inherit;
    }
    
    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }
    
    .btn-primary {
      background: var(--text);
      color: var(--bg);
    }
    
    /* Main Layout */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    
    /* Left Sidebar - Template List */
    .sidebar {
      width: 240px;
      border-right: 1px solid var(--border);
      background: var(--surface);
      overflow-y: auto;
      flex-shrink: 0;
    }
    
    .sidebar-header {
      padding: 14px 16px;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    
    .template-list {
      padding: 8px;
    }
    
    .template-item {
      padding: 12px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: 3px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .template-item:hover {
      background: #111;
    }
    
    .template-item.active {
      background: #1a1a1a;
    }
    
    .template-icon {
      font-size: 16px;
    }
    
    .template-info {
      flex: 1;
      overflow: hidden;
    }
    
    .template-name {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    /* Editor Area - Left: Preview, Right: Form */
    .editor {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    
    .editor-preview {
      flex: 1;
      overflow-y: auto;
      padding: 32px;
      background: #f5f5f5;
    }
    
    .editor-form {
      width: 45%;
      border-left: 1px solid var(--border);
      overflow-y: auto;
      padding: 24px;
      background: var(--surface);
    }
    
    /* Form Styles */
    .form-section {
      margin-bottom: 24px;
    }
    
    .form-section-title {
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    
    .form-group.full {
      grid-column: 1 / -1;
    }
    
    .form-label {
      font-size: 11px;
      color: #888;
    }
    
    .form-input, .form-textarea {
      background: #111;
      border: 1px solid #222;
      border-radius: 6px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    
    .form-input:focus, .form-textarea:focus {
      outline: none;
      border-color: #333;
    }
    
    .form-textarea {
      resize: vertical;
      min-height: 80px;
    }
    
    /* Resume Preview Styles */
    .resume-paper {
      background: #fff;
      color: #111;
      border-radius: 8px;
      padding: 40px;
      max-width: 600px;
      margin: 0 auto;
      box-shadow: 0 2px 20px rgba(0,0,0,0.1);
      font-size: 13px;
    }
    
    .resume-name {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    
    .resume-target {
      font-size: 14px;
      color: #666;
      margin-bottom: 12px;
    }
    
    .resume-meta {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: #888;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid #eee;
    }
    
    .resume-section {
      margin-bottom: 20px;
    }
    
    .resume-section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #111;
      margin-bottom: 10px;
      padding-bottom: 4px;
      border-bottom: 1px solid #eee;
    }
    
    .resume-text {
      font-size: 12px;
      color: #444;
      line-height: 1.7;
    }
    
    .resume-skills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    
    .skill-tag {
      background: #f0f0f0;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 11px;
      color: #333;
    }
    
    .resume-item {
      margin-bottom: 14px;
    }
    
    .resume-item-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 2px;
    }
    
    .resume-item-title {
      font-weight: 600;
      font-size: 13px;
    }
    
    .resume-item-date {
      font-size: 11px;
      color: #888;
    }
    
    .resume-item-subtitle {
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }
    
    .resume-item-desc {
      font-size: 12px;
      color: #444;
      line-height: 1.6;
    }
    
    /* Responsive */
    @media print {
      .topbar, .sidebar, .editor-form { display: none !important; }
      .editor { display: block; }
      .editor-preview { 
        padding: 0; 
        background: white;
      }
      .resume-paper {
        box-shadow: none;
        max-width: 100%;
      }
    }
  </style>

    };
    
    let currentTemplate = '01';
    
    function renderTemplateList() {
      const list = document.getElementById('templateList');
      list.innerHTML = templates.map(t => `
        <div class="template-item ${t.id === currentTemplate ? 'active' : ''}" onclick="selectTemplate('${t.id}')">
          <div class="template-icon">${t.icon}</div>
          <div class="template-info">
            <div class="template-name">${t.name}</div>
          </div>
        </div>
      `).join('');
    }
    
    function selectTemplate(id) {
      currentTemplate = id;
      renderTemplateList();
      loadForm(id);
      renderPreview();
    }
    
    function loadForm(id) {
      const form = document.getElementById('editorForm');
      form.innerHTML = formTemplates[id] || formTemplates['default'];
      
      // Add event listeners
      form.querySelectorAll('input, textarea').forEach(el => {
        el.addEventListener('input', renderPreview);
      });
      
      // Load saved data
      const saved = localStorage.getItem('resume_' + id);
      if (saved) {
        const data = JSON.parse(saved);
        Object.keys(data).forEach(key => {
          const el = form.querySelector('#' + key);
          if (el) el.value = data[key];
        });
      }
    }
    
    function getVal(id) {
      return document.getElementById(id)?.value || '';
    }
    
    function renderPreview() {
      const paper = document.getElementById('resumePaper');
      const name = getVal('name') || 'Your Name';
      const job = jobNames[currentTemplate] || '目标岗位';
      const city = getVal('city') || 'City';
      const exp = getVal('experience') || 'X年';
      const salary = getVal('salary') || 'XXK';
      const summary = getVal('summary') || '个人简介...';
      const skills = getVal('skills').split(',').map(s => s.trim()).filter(Boolean);
      const project = getVal('project') || '项目经历...';
      const work = getVal('work') || '工作经历...';
      
      paper.innerHTML = `
        <div class="resume-name">${name}</div>
        <div class="resume-target">${job}</div>
        <div class="resume-meta">
          <span>📍 ${city}</span>
          <span>💼 ${exp}</span>
          <span>💰 ${salary}</span>
        </div>
        
        <div class="resume-section">
          <div class="resume-section-title">个人简介</div>
          <p class="resume-text">${summary}</p>
        </div>
        
        ${skills.length ? `
        <div class="resume-section">
          <div class="resume-section-title">核心技能</div>
          <div class="resume-skills">
            ${skills.map(s => `<span class="skill-tag">${s}</span>`).join('')}
          </div>
        </div>
        ` : ''}
        
        <div class="resume-section">
          <div class="resume-section-title">项目经历</div>
          <div class="resume-item">
            <div class="resume-item-desc">${project}</div>
          </div>
        </div>
        
        ${getVal('work') ? `
        <div class="resume-section">
          <div class="resume-section-title">工作经历</div>
          <div class="resume-item">
            <div class="resume-item-desc">${work}</div>
          </div>
        </div>
        ` : ''}
      `;
      
      // Auto-save
      const data = {};
      document.getElementById('editorForm').querySelectorAll('input, textarea').forEach(el => {
        if (el.id) data[el.id] = el.value;
      });
      localStorage.setItem('resume_' + currentTemplate, JSON.stringify(data));
    }
    
    function resetForm() {
      if (confirm('确定要重置当前简历吗？')) {
        localStorage.removeItem('resume_' + currentTemplate);
        loadForm(currentTemplate);
        renderPreview();
      }
    }
    
    // Init
