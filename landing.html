<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>清道夫 · AI简历助手</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #050505;
      --surface: #0a0a0a;
      --border: #1a1a1a;
      --text: #fff;
      --muted: #555;
      --accent: #3b82f6;
    }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    
    /* Animated Background */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridMove 20s linear infinite;
    }
    
    @keyframes gridMove {
      0% { transform: translate(0, 0); }
      100% { transform: translate(60px, 60px); }
    }
    
    .bg-glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      filter: blur(150px);
      opacity: 0.15;
      animation: glowPulse 8s ease-in-out infinite;
    }
    
    .bg-glow-1 {
      background: #3b82f6;
      top: -200px;
      left: -200px;
    }
    
    .bg-glow-2 {
      background: #8b5cf6;
      bottom: -200px;
      right: -200px;
      animation-delay: 4s;
    }
    
    @keyframes glowPulse {
      0%, 100% { opacity: 0.1; transform: scale(1); }
      50% { opacity: 0.2; transform: scale(1.1); }
    }
    
    /* Content */
    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 40px;
      max-width: 700px;
    }
    
    /* Logo Animation */
    .logo {
      font-size: 14px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 40px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.8s ease-out 0.3s forwards;
    }
    
    /* Main Title */
    .title {
      font-size: clamp(48px, 10vw, 80px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 24px;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 0.8s ease-out 0.5s forwards;
    }
    
    .title-cn {
      display: block;
      background: linear-gradient(135deg, #fff 0%, #888 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    /* Tagline */
    .tagline {
      font-size: 18px;
      color: var(--muted);
      margin-bottom: 16px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.8s ease-out 0.7s forwards;
    }
    
    /* Description */
    .desc {
      font-size: 15px;
      color: #444;
      line-height: 1.8;
      max-width: 480px;
      margin: 0 auto 48px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.8s ease-out 0.9s forwards;
    }
    
    /* Job Pills */
    .jobs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 48px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.8s ease-out 1.1s forwards;
    }
    
    .job-pill {
      padding: 6px 14px;
      background: #111;
      border: 1px solid #222;
      border-radius: 20px;
      font-size: 12px;
      color: #666;
      transition: all 0.3s;
    }
    
    .job-pill:hover {
      border-color: #444;
      color: #999;
    }
    
    /* CTA Button */
    .cta {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.8s ease-out 1.3s forwards;
    }
    
    .btn-enter {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: var(--text);
      color: var(--bg);
      padding: 18px 40px;
      border-radius: 60px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    
    .btn-enter::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 0%, rgba(59,130,246,0.2) 100%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    .btn-enter:hover {
      transform: scale(1.04);
      box-shadow: 0 20px 60px rgba(255,255,255,0.15);
    }
    
    .btn-enter:hover::before {
      opacity: 1;
    }
    
    .btn-enter svg {
      width: 20px;
      height: 20px;
      transition: transform 0.3s;
    }
    
    .btn-enter:hover svg {
      transform: translateX(4px);
    }
    
    /* Footer hint */
    .hint {
      position: fixed;
      bottom: 32px;
      font-size: 12px;
      color: #333;
      opacity: 0;
      animation: fadeUp 0.8s ease-out 1.6s forwards;
    }
    
    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    /* Responsive */
    @media (max-width: 600px) {
      .content { padding: 24px; }
      .title { font-size: 40px; }
      .desc { font-size: 14px; }
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  
  <div class="content">
    <div class="logo">AI Resume Builder</div>
    
    <h1 class="title">
      <span class="title-cn">清道夫</span>
    </h1>
    
    <p class="tagline">AI简历助手 · 11个岗位一键定制</p>
    
    <p class="desc">
      专注AI时代的简历定制，从模板选择到PDF导出<br>
      三分钟生成专业简历
    </p>
    
    <div class="jobs">
      <span class="job-pill">Agent开发</span>
      <span class="job-pill">AI产品经理</span>
      <span class="job-pill">AI算法</span>
      <span class="job-pill">前端工程</span>
      <span class="job-pill">后端工程</span>
      <span class="job-pill">AI运营</span>
      <span class="job-pill">数据标注</span>
      <span class="job-pill">安全专家</span>
      <span class="job-pill">售前顾问</span>
      <span class="job-pill">市场品牌</span>
      <span class="job-pill">垂类落地</span>
    </div>
    
    <div class="cta">
      <a href="./index.html" class="btn-enter">
        开始创作
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </a>
    </div>
  </div>
  
  <div class="hint">选岗位 · 填信息 · 导PDF</div>
</body>
</html>
